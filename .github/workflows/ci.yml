name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: write

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Create file to archive
        run: |
          mkdir -p output/test/
          date > output/test/date.txt

      - name: Archive file
        uses: actions/upload-artifact@v4
        with:
          name: output-test-date
          path: output/test/date.txt

      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          filterByName: output-test-date
          # filter artifacts not equal to current workflow run id
          filterByWorkflowRunId: ^(?!${{ github.run_id }}).*$

      - name: Print Output
        id: output
        run: echo "${{ steps.test-action.outputs.deletedArtifacts }}"
